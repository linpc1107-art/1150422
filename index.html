<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林柏誠 婚禮攝影</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fafafa;
            color: #222;
            line-height: 1.6;
        }

        .container {
            width: min(1100px, 95%);
            margin: 0 auto;
            padding: 40px 0;
        }

        .hero {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 40px;
            align-items: center;
            padding-bottom: 40px;
        }

        .hero-image {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        .hero-image img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%);
        }

        .hero-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
        }

        .hero-info h1 {
            margin: 0;
            font-size: clamp(2.5rem, 4vw, 4rem);
            letter-spacing: 0.06em;
            font-weight: 400;
        }

        .hero-info p {
            margin: 0;
            font-size: 1.05rem;
            color: #444;
        }

        .hero-info button {
            width: fit-content;
            padding: 14px 32px;
            border: none;
            border-radius: 999px;
            background-color: #111;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }

        .hero-info button:hover {
            background-color: #333;
        }

        section {
            padding: 40px 0;
        }

        .section-title {
            font-size: 2rem;
            margin: 0 0 30px;
            text-align: center;
            font-weight: 400;
            color: #111;
        }

        .pricing-grid,
        .portfolio-grid {
            display: grid;
            gap: 20px;
        }

        .pricing-grid {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .card {
            background-color: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
        }

        .card h3 {
            margin: 0 0 10px;
            font-size: 1.1rem;
            letter-spacing: 0.04em;
            color: #111;
        }

        .card .price {
            margin-top: 16px;
            font-size: 2rem;
            font-weight: 700;
            color: #000;
        }

        .booking-form {
            max-width: 720px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }

        .booking-form .field-group {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .booking-form select,
        .booking-form input,
        .booking-form button {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            color: #222;
            background-color: #fff;
        }

        .booking-form button {
            border: none;
            background-color: #111;
            color: #fff;
            border-radius: 999px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .booking-form button:hover {
            background-color: #333;
        }

        .portfolio-grid {
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        .portfolio-item {
            overflow: hidden;
            border-radius: 18px;
            background-color: #fff;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
        }

        .portfolio-item img {
            width: 100%;
            display: block;
            filter: grayscale(100%);
        }

        .portfolio-item p {
            margin: 16px;
            color: #444;
            font-size: 1rem;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            align-items: center;
            justify-items: center;
        }

        .contact-card {
            background-color: #fff;
            padding: 24px;
            border-radius: 18px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }

        .contact-card h3 {
            margin: 0 0 10px;
            font-size: 1.1rem;
            color: #111;
        }

        .contact-card p {
            margin: 8px 0;
            color: #444;
        }

        .bio {
            max-width: 840px;
            margin: 0 auto;
            font-size: 1.05rem;
            color: #444;
        }

        @media (max-width: 860px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .booking-form .field-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <div class="hero-image">
                <img id="heroPhoto" src="https://picsum.photos/720/520?grayscale&random=1" alt="雙手對戒黑白照片">
            </div>
            <div class="hero-info">
                <h1>婚禮攝影紀錄</h1>
                <p>擁有十年經驗攝影婚禮紀錄，每次都是一場故事的開始，都是一場溫馨感人的時刻，新人的第三隻眼，看到宇著不同的感動。</p>
                <button onclick="generatePhoto()">生成黑白對戒照片</button>
            </div>
        </section>

        <section>
            <div class="section-title">價格表</div>
            <div class="pricing-grid">
                <div class="card">
                    <h3>儀式午宴</h3>
                    <div class="price">18800</div>
                </div>
                <div class="card">
                    <h3>儀式晚宴</h3>
                    <div class="price">22800</div>
                </div>
                <div class="card">
                    <h3>雙儀式宴客</h3>
                    <div class="price">36000</div>
                </div>
                <div class="card">
                    <h3>單宴客 / 單儀式</h3>
                    <div class="price">15800</div>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">預約表</div>
            <div class="booking-form">
                <div class="field-group">
                    <select id="year">
                        <option value="2026">2026年</option>
                        <option value="2027">2027年</option>
                        <option value="2028">2028年</option>
                    </select>
                    <select id="month">
                        <option value="1">1月</option>
                        <option value="2">2月</option>
                        <option value="3">3月</option>
                        <option value="4">4月</option>
                        <option value="5">5月</option>
                        <option value="6">6月</option>
                        <option value="7">7月</option>
                        <option value="8">8月</option>
                        <option value="9">9月</option>
                        <option value="10">10月</option>
                        <option value="11">11月</option>
                        <option value="12">12月</option>
                    </select>
                    <input type="date" id="date">
                </div>
                <div class="field-group">
                    <input type="time" id="time">
                    <button type="button" onclick="bookAppointment()">確認預約</button>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">作品區</div>
            <div class="portfolio-grid">
                <div class="portfolio-item">
                    <img src="https://picsum.photos/400/300?grayscale&random=2" alt="作品1">
                    <p>婚禮儀式紀錄</p>
                </div>
                <div class="portfolio-item">
                    <img src="https://picsum.photos/400/300?grayscale&random=3" alt="作品2">
                    <p>新人互動瞬間</p>
                </div>
                <div class="portfolio-item">
                    <img src="https://picsum.photos/400/300?grayscale&random=4" alt="作品3">
                    <p>晚宴現場情感</p>
                </div>
                <div class="portfolio-item">
                    <img src="https://picsum.photos/400/300?grayscale&random=5" alt="作品4">
                    <p>儀式氛圍捕捉</p>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">聯絡方式</div>
            <div class="contact-grid">
                <div class="contact-card">
                    <h3>電話</h3>
                    <p>0982088752</p>
                </div>
                <div class="contact-card">
                    <h3>Line</h3>
                    <p>lin-b-c</p>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">個人簡介</div>
            <div class="bio">
                <p>擁有十年經驗攝影婚禮紀錄，每次都是一場故事的開始，都是一場溫馨感人的時刻，新人的第三隻眼，看到宇著不同的感動。</p>
            </div>
        </section>
    </div>

    <script>
        function generatePhoto() {
            const heroPhoto = document.getElementById('heroPhoto');
            const randomId = Math.floor(Math.random() * 1000) + 1;
            heroPhoto.src = `https://picsum.photos/720/520?grayscale&random=${randomId}`;
        }

        function bookAppointment() {
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            if (!date || !time) {
                alert('請選擇日期和時間');
                return;
            }
            alert(`預約成功！${year}年 ${month}月 ${date}，時間：${time}`);
        }
    </script>
</body>
</html>
